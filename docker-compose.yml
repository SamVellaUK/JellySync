services:
  jellysync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jellysync
    networks:
      - media
    ports:
      - "9500:9500"  # Change first port if you changed port in config.json
    volumes:
      - "./jellysync:/volume"
      # Uncomment both lines below if using the fileCopy feature:
      # - "/path/to/your/media:/media:ro"   # same mount as master Jellyfin (read-only source)
      # - "/path/to/your/mirror:/mirror"    # destination mirror share
    restart: unless-stopped

networks:
  media:
    driver: bridge
